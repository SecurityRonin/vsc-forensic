site_name: vsc-forensic
site_url: https://securityronin.github.io/vsc-forensic/
repo_url: https://github.com/SecurityRonin/vsc-forensic
repo_name: SecurityRonin/vsc-forensic
edit_uri: edit/main/docs/

# Directory URLs (/privacy/, /terms/) — matches the SecurityRonin README footer
# standard (…/<repo>/privacy/). Flat .html URLs would 404 the footer links.
use_directory_urls: true

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Format Research: RESEARCH.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

plugins:
  - search
